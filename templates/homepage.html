{% extends "layout.html" %}
{% block content %}
<main class="home-shell">
    <h1 class="game-title">SHMAMALE</h1>

    <section class="menu-grid unified-menu">
        <div class="menu-card menu-card-purple">
            <h2>PLAY</h2>
            <p class="menu-card-copy">Create one room, invite friends with the code, and add bots in the waiting room.</p>
            <a href="/create-room" class="btn btn-purple full">CREATE PLAY ROOM</a>
            <form action="/join-room" method="POST" class="join-form">
                <input type="text" name="room_id" maxlength="8" placeholder="ROOM CODE" autocomplete="off">
                <button type="submit" class="btn btn-green full">JOIN ROOM</button>
            </form>
            <div class="menu-divider"><span>NEW TO SHMAMALE?</span></div>
            <a href="/tutorial" class="btn btn-blue full">HOW TO PLAY</a>
        </div>
    </section>
</main>
{% endblock %}
